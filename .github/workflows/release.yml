name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}
      - run: strip target/${{ matrix.target }}/release/voxtype-tray

      - name: Archive binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf voxtype-tray-${{ matrix.target }}.tar.gz voxtype-tray
          sha256sum voxtype-tray-${{ matrix.target }}.tar.gz > voxtype-tray-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/voxtype-tray-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/voxtype-tray-${{ matrix.target }}.tar.gz.sha256
